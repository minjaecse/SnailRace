spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  cloud:
    aws:
      s3:
        bucket: gachon-18-s3
      region:
        static: ap-northeast-2

server:
  port: 8081

app:
  s3:
    base-folder: videos

ai:
  server:
    base-url: ${AI_SERVER_BASE_URL:http://ceprj.gachon.ac.kr:60006}

spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop

  sql:
    init:
      mode: never

  cloud:
    aws:
      s3:
        bucket: gachon-18-s3
      region:
        static: ap-northeast-2

app:
  s3:
    base-folder: videos

ai:
  server:
    base-url: http://localhost:60006

jwt:
  secret: secret-key-at-least-32-characters-long-12345678901234567890

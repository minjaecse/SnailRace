spring:
  datasource:
    url: jdbc:h2:mem:userdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

  cloud:
    aws:
      s3:
        enabled: true
        bucket: gachon-18-s3
      region:
        static: ap-northeast-2

app:
  s3:
    base-folder: videos
